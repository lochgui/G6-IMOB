<!DOCTYPE html>
<!-- saved from url=(0049)file:///C:/Users/user/Downloads/crm-pipeline.html -->
<html lang="pt-br"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>G6 Imobiliário</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

.container { padding: 30px; }

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

.pipeline {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 30px;
}

.step {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.step.active {
  border: 2px solid #38bdf8;
}

.form-box {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.add { background: #38bdf8; }
.delete { background: #ef4444; color: white; }
.next { background: #22c55e; }

.table-box {
  background: #1e293b;
  border-radius: 12px;
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
}

th, td {
  padding: 12px;
}

th {
  color: #94a3b8;
  border-bottom: 1px solid #334155;
}

.table-input {
  width: 100%;
  background: #0f172a;
  color: #e2e8f0;
  border-radius: 6px;
  padding: 6px;
  text-align: center;
}

.select-table {
  background: #0f172a;
  color: #e2e8f0;
  border-radius: 6px;
  padding: 6px;
}

.retorno-select {
  width: 120px;
  text-align: center;
  font-weight: bold;
}

.aprovado { color: #22c55e; }
.condicionado { color: #facc15; }
.reprovado { color: #ef4444; }

.registro-box {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">
  <h1>🏦 G6 Imobiliário</h1>

  <div class="cards">
    <div class="card">Clientes: <strong id="totalClientes">0</strong></div>
    <div class="card">Aprovados: <strong id="totalAprovados">0</strong></div>
    <div class="card">Contratação: <strong id="totalContratacao">0</strong></div>
  </div>

  <div class="pipeline" id="pipeline">
      <div class="step " onclick="filtrarEtapa(0)">
        Atendido<br><strong>0</strong>
      </div>
    
      <div class="step " onclick="filtrarEtapa(1)">
        Aprovado<br><strong>0</strong>
      </div>
    
      <div class="step " onclick="filtrarEtapa(2)">
        Contratação<br><strong>0</strong>
      </div>
    
      <div class="step " onclick="filtrarEtapa(3)">
        Engenharia<br><strong>0</strong>
      </div>
    
      <div class="step " onclick="filtrarEtapa(4)">
        Jurídico<br><strong>0</strong>
      </div>
    
      <div class="step " onclick="filtrarEtapa(5)">
        Assinatura<br><strong>0</strong>
      </div>
    
      <div class="step " onclick="filtrarEtapa(6)">
        Registro<br><strong>0</strong>
      </div>
    
      <div class="step " onclick="filtrarEtapa(7)">
        Pagamento<br><strong>0</strong>
      </div>
    
    <div class="step" onclick="limparFiltro()" style="background:#334155;">
      Ver Todos
    </div>
  </div>

  <div class="form-box">
    <h3>Adicionar Cliente</h3>

    <input id="nome" placeholder="Nome">
    <input id="parceiro" placeholder="Parceiro">

    <select id="retorno">
      <option value="aprovado">Aprovado</option>
      <option value="condicionado">Condicionado</option>
      <option value="reprovado">Reprovado</option>
    </select>

    <input id="valor" placeholder="Valor do financiamento (R$)">

    <select id="bancos">
      <option value="Bradesco">Bradesco</option>
      <option value="Itaú">Itaú</option>
      <option value="Santander">Santander</option>
      <option value="Inter">Inter</option>
      <option value="Caixa">Caixa</option>
    </select>

    <button class="add" onclick="adicionarCliente()">Adicionar</button>
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Parceiro</th>
          <th>Retorno</th>
          <th>Valor</th>
          <th>Status</th>
          <th>Etapa</th>
          <th>Bancos</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>
</div>

<script>
const etapas = [
  "Atendido",
  "Aprovado",
  "Contratação",
  "Engenharia",
  "Jurídico",
  "Assinatura",
  "Registro",
  "Pagamento"
];

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let filtroEtapa = null;

function salvar() {
  localStorage.setItem("clientes", JSON.stringify(clientes));
}

function adicionarCliente() {
  const cliente = {
    nome: nome.value,
    parceiro: parceiro.value,
    retorno: retorno.value,
    valor: valor.value,
    status: "",
    bancos: bancos.value,
    etapa: 0,

    // REGISTRO
    registro: "",
    formato: "",
    solicitante: "",
    login: "",
    senha: "",
    responsavel: "",
    registroSalvo: false
  };

  clientes.push(cliente);
  salvar();
  render();
}

function excluir(i) {
  clientes.splice(i, 1);
  salvar();
  render();
}

function avancar(i) {
  if (clientes[i].etapa < etapas.length - 1) {
    clientes[i].etapa++;
    salvar();
    render();
  }
}

function alterarRetorno(i, valor) {
  clientes[i].retorno = valor;
  salvar();
  render();
}

function alterarStatus(i, valor) {
  clientes[i].status = valor;
  salvar();
}

function alterarBanco(i, valor) {
  clientes[i].bancos = valor;
  salvar();
}

function alterarCampoRegistro(i, campo, valor) {
  clientes[i][campo] = valor;
  clientes[i].registroSalvo = false; // 🔥 reset
  salvar();
}

function salvarRegistro(i) {
  clientes[i].registroSalvo = true;
  salvar();
  render();
}

function filtrarEtapa(index) {
  filtroEtapa = index;
  render();
}

function limparFiltro() {
  filtroEtapa = null;
  render();
}

function render() {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  let lista = clientes;
  if (filtroEtapa !== null) {
    lista = clientes.filter(c => c.etapa === filtroEtapa);
  }

  lista.forEach((c) => {
    const i = clientes.indexOf(c);

    let registroHTML = "";

    if (etapas[c.etapa] === "Registro") {
      registroHTML = `
      <tr>
        <td colspan="8">
          <div class="registro-box">

            <b>📄 DADOS DO REGISTRO</b><br><br>

            <select onchange="alterarCampoRegistro(${i}, 'registro', this.value)">
              <option value="">Registro</option>
              <option value="1" ${c.registro=="1"?"selected":""}>1º</option>
              <option value="2" ${c.registro=="2"?"selected":""}>2º</option>
              <option value="3" ${c.registro=="3"?"selected":""}>3º</option>
              <option value="4" ${c.registro=="4"?"selected":""}>4º</option>
              <option value="5" ${c.registro=="5"?"selected":""}>5º</option>
            </select>

            <select onchange="alterarCampoRegistro(${i}, 'formato', this.value)">
              <option value="">Formato</option>
              <option value="digital" ${c.formato=="digital"?"selected":""}>Digital</option>
              <option value="fisico" ${c.formato=="fisico"?"selected":""}>Físico</option>
            </select>

            <input placeholder="Solicitante" value="${c.solicitante}" 
              oninput="alterarCampoRegistro(${i}, 'solicitante', this.value)">

            <input placeholder="Login" value="${c.login}" 
              oninput="alterarCampoRegistro(${i}, 'login', this.value)">

            <input placeholder="Senha" value="${c.senha}" 
              oninput="alterarCampoRegistro(${i}, 'senha', this.value)">

            <input placeholder="Responsável" value="${c.responsavel}" 
              oninput="alterarCampoRegistro(${i}, 'responsavel', this.value)">

            <br><br>

            <button class="add" onclick="salvarRegistro(${i})">
              💾 Salvar Registro
            </button>

            ${
              c.registroSalvo 
              ? '<span style="margin-left:10px;color:#22c55e;font-weight:bold;">Salvo ✅</span>'
              : ''
            }

          </div>
        </td>
      </tr>
      `;
    }

    tabela.innerHTML += `
    <tr>
      <td>${c.nome}</td>
      <td>${c.parceiro}</td>

      <td>
        <select onchange="alterarRetorno(${i}, this.value)" class="retorno-select ${c.retorno}">
          <option value="aprovado" ${c.retorno==="aprovado"?"selected":""}>Aprovado</option>
          <option value="condicionado" ${c.retorno==="condicionado"?"selected":""}>Condicionado</option>
          <option value="reprovado" ${c.retorno==="reprovado"?"selected":""}>Reprovado</option>
        </select>
      </td>

      <td>R$ ${c.valor || '-'}</td>

      <td>
        <input class="table-input"
          value="${c.status || ''}"
          oninput="alterarStatus(${i}, this.value)">
      </td>

      <td>${etapas[c.etapa]}</td>

      <td>
        <select onchange="alterarBanco(${i}, this.value)" class="select-table">
          <option ${c.bancos==="Bradesco"?"selected":""}>Bradesco</option>
          <option ${c.bancos==="Itaú"?"selected":""}>Itaú</option>
          <option ${c.bancos==="Santander"?"selected":""}>Santander</option>
          <option ${c.bancos==="Inter"?"selected":""}>Inter</option>
          <option ${c.bancos==="Caixa"?"selected":""}>Caixa</option>
        </select>
      </td>

      <td>
        <button class="next" onclick="avancar(${i})">➡️</button>
        <button class="delete" onclick="excluir(${i})">X</button>
      </td>
    </tr>

    ${registroHTML}
    `;
  });

  atualizarDashboard();
  atualizarPipeline();
}

function atualizarDashboard() {
  totalClientes.innerText = clientes.length;
  totalAprovados.innerText = clientes.filter(c => c.retorno === "aprovado").length;
  totalContratacao.innerText = clientes.filter(c => etapas[c.etapa] === "Contratação").length;
}

function atualizarPipeline() {
  const pipeline = document.getElementById("pipeline");
  pipeline.innerHTML = "";

  etapas.forEach((etapa, index) => {
    const total = clientes.filter(c => c.etapa === index).length;

    pipeline.innerHTML += `
      <div class="step ${filtroEtapa===index ? 'active' : ''}" onclick="filtrarEtapa(${index})">
        ${etapa}<br><strong>${total}</strong>
      </div>
    `;
  });

  pipeline.innerHTML += `
    <div class="step" onclick="limparFiltro()" style="background:#334155;">
      Ver Todos
    </div>
  `;
}

render();
</script>



</body></html>
